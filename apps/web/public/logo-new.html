<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; background: #050810; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.logo-container { padding: 40px; }
</style>
</head>
<body>
<div class="logo-container">
<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TerraQura Logo Mark -->
  <g transform="translate(10, 10)">
    <!-- Circular swirl design -->
    <path d="M40 10C22.3 10 8 24.3 8 42c0 15.5 11.2 28.4 26 31.3" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M40 10c17.7 0 32 14.3 32 32 0 15.5-11.2 28.4-26 31.3" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
    <circle cx="40" cy="42" r="8" fill="white"/>
    <!-- Inner swirl -->
    <path d="M40 25c-9.4 0-17 7.6-17 17s7.6 17 17 17" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M40 25c9.4 0 17 7.6 17 17s-7.6 17-17 17" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.25"/>
  </g>
  <!-- TerraQura Text -->
  <text x="100" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="300" fill="white" letter-spacing="0.05em">TERRA</text>
  <text x="260" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="300" fill="white" letter-spacing="0.05em">QURA</text>
</svg>
</div>
</body>
</html>
