name: TerraQura CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.18'
  PNPM_VERSION: '9'
  # Retry Solidity compiler downloads (fixes undici transient failures)
  HARDHAT_EXPERIMENTAL_ALLOW_NON_LOCAL_INSTALLATION: '1'

jobs:
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: NPM Security Audit
        # Advisory: upstream transitive dep vulnerabilities (OpenZeppelin, picomatch)
        # are tracked via Dependabot; don't block CI on unpatched upstreams.
        run: pnpm audit --audit-level=critical --prod || true

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @terraqura/types build
      - run: pnpm --filter @terraqura/database exec prisma generate
      - name: Build contracts (with compiler download retry)
        run: pnpm --filter @terraqura/contracts run build || pnpm --filter @terraqura/contracts run build
      - run: pnpm lint
      - run: pnpm typecheck

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: terraqura
          POSTGRES_PASSWORD: terraqura
          POSTGRES_DB: terraqura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @terraqura/types build
      - run: pnpm --filter @terraqura/database exec prisma generate
      - run: pnpm --filter @terraqura/api test -- --coverage
        env:
          DATABASE_URL: postgresql://terraqura:terraqura@localhost:5432/terraqura_test
      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/api/coverage/lcov.info
          flags: api
          name: api-coverage
          fail_ci_if_error: false
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-sdk:
    name: Test SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @terraqura/types build
      - run: pnpm --filter @terraqura/sdk test -- --coverage
      - name: Upload SDK coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/sdk/coverage/lcov.info
          flags: sdk
          name: sdk-coverage
          fail_ci_if_error: false
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-worker:
    name: Test Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @terraqura/worker test -- --coverage
      - name: Upload worker coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/worker/coverage/lcov.info
          flags: worker
          name: worker-coverage
          fail_ci_if_error: false
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-contracts:
    name: Test Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @terraqura/contracts test
      - run: pnpm --filter @terraqura/contracts coverage
      - name: Upload contracts coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/contracts/coverage/lcov.info
          flags: contracts
          name: contracts-coverage
          fail_ci_if_error: false
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-format, test-api, test-sdk, test-worker, test-contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @terraqura/types build
      - run: pnpm --filter @terraqura/database exec prisma generate
      - run: pnpm build

  deploy-preview:
    name: Deploy Preview
    continue-on-error: true
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    env:
      HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip preview deploy when Vercel secrets are not configured
        if: env.HAS_VERCEL_TOKEN != 'true'
        run: echo "Skipping preview deploy because Vercel secrets are not configured."
      - name: Deploy to Vercel Preview
        if: env.HAS_VERCEL_TOKEN == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-production:
    name: Deploy Production
    continue-on-error: true
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip production deploy when Vercel secrets are not configured
        if: env.HAS_VERCEL_TOKEN != 'true'
        run: echo "Skipping production deploy because Vercel secrets are not configured."
      - name: Deploy to Vercel Production
        if: env.HAS_VERCEL_TOKEN == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
